<h2>Admin Panel</h2>

<form #form="ngForm" (ngSubmit)="createOrUpdate()">

  <input 
    [(ngModel)]="notification.title" 
    name="title" 
    placeholder="Title" 
    required 
  />

  <br />

  <textarea 
    [(ngModel)]="notification.content" 
    name="content" 
    placeholder="Content"
    required
  ></textarea>

  <br />

  <button type="submit">
    {{ notification.id ? 'Update' : 'Create' }}
  </button>

  <button type="button" (click)="resetForm()">
    Clear
  </button>

</form>

<hr />

<h3>Available Notifications</h3>

<table border="1" width="100%" cellpadding="8" cellspacing="0">

 
  <thead>
    <tr style="background:#f2f2f2;">
      <th>ID</th>
      <th>Title</th>
      <th>Content</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

 
  <tbody>
    <tr *ngFor="let n of notifications">

      <td>{{ n.id }}</td>
      <td>{{ n.title }}</td>
      <td>{{ n.content }}</td>

      <td>
        <span [style.color]="n.active ? 'green' : 'gray'">
          {{ n.active ? 'ACTIVE' : 'INACTIVE' }}
        </span>
      </td>

      <td>
        <button (click)="edit(n)">Edit</button>
        <button (click)="delete(n.id!)">Delete</button>

        <button 
          (click)="setActive(n.id!)"
          [disabled]="n.active">
          Activate
        </button>

        <button 
        (click)="deactivate(n.id!)"
        [disabled]="!n.active">
          Deactivate
</button>
      </td>

    </tr>
  </tbody>

</table>
